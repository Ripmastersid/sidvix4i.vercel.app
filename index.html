<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidvix4I - Gerador de Vídeo com IA</title>
    <link rel="icon" type="image/png" href="./faviconx.png">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 500: '#0ea5e9', 600: '#0284c7' },
                        accent: { 500: '#d946ef', 600: '#c026d3' },
                        dark: { 900: '#0f172a', 950: '#020617' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #020617; color: white; font-family: system-ui, sans-serif; }
        .gradient-text { background: linear-gradient(135deg, #0ea5e9, #d946ef); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #0ea5e9, #d946ef); transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(14, 165, 233, 0.4); }
        
        /* Sidebar - Desktop sempre visível, Mobile escondido */
        .sidebar { transition: transform 0.3s ease; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: fixed; z-index: 50; width: 280px; height: 100vh; }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 40; }
            .sidebar-overlay.active { display: block; }
        }
        .sidebar-item.active { background: rgba(14, 165, 233, 0.1); border-left: 3px solid #0ea5e9; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <!-- Overlay para mobile -->
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

    <div class="flex h-screen overflow-hidden">
        <!-- SIDEBAR -->
        <aside id="sidebar" class="sidebar w-64 bg-dark-900 border-r border-gray-800 flex flex-col">
            <!-- Logo -->
            <div class="p-6 border-b border-gray-800">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-2">
                        <div class="w-10 h-10 rounded-xl overflow-hidden">
                            <img src="./apple-touch-icon.png" alt="Sidvix4I" class="w-full h-full object-cover">
                        </div>
                        <span class="text-xl font-bold gradient-text">Sidvix4I</span>
                    </div>
                    <button onclick="closeSidebar()" class="md:hidden text-gray-400 hover:text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Menu -->
            <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                <button onclick="switchTab('create')" class="sidebar-item active w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-left text-gray-300 hover:text-white hover:bg-white/5 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    <span>Criar vídeo</span>
                </button>
                <button onclick="switchTab('myvideos')" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-left text-gray-300 hover:text-white hover:bg-white/5 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                    </svg>
                    <span>Meus vídeos</span>
                </button>
                <button onclick="switchTab('templates')" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-left text-gray-300 hover:text-white hover:bg-white/5 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"/>
                    </svg>
                    <span>Modelos</span>
                </button>
            </nav>

            <!-- Footer Sidebar -->
            <div class="p-4 border-t border-gray-800">
                <div class="glass rounded-xl p-4 mb-4">
                    <div class="text-sm text-gray-400 mb-2">Plano Gratuito</div>
                    <div class="w-full bg-gray-700 rounded-full h-2 mb-2">
                        <div class="bg-gradient-to-r from-primary-500 to-accent-500 h-2 rounded-full" style="width: 30%"></div>
                    </div>
                    <div class="text-xs text-gray-500">3/10 vídeos utilizados</div>
                </div>
                <button onclick="logout()" class="w-full flex items-center justify-center space-x-2 px-4 py-2 rounded-lg text-gray-400 hover:text-white hover:bg-gray-800 transition">
                    <span>Sair</span>
                </button>
            </div>
        </aside>

        <!-- CONTEÚDO PRINCIPAL -->
        <main class="flex-1 overflow-y-auto">
            <!-- Header -->
            <header class="sticky top-0 z-30 glass border-b border-gray-800 px-6 py-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                            </svg>
                        </button>
                        <h1 id="pageTitle" class="text-xl font-bold">Criar vídeo</h1>
                    </div>
                    <div class="flex items-center space-x-2">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-primary-500 to-accent-500 flex items-center justify-center text-sm font-bold">S</div>
                    </div>
                </div>
            </header>

            <!-- ABA: CRIAR VÍDEO -->
            <div id="createTab" class="tab-content active p-6">
                <div class="max-w-4xl mx-auto space-y-6">
                    <!-- Prompt -->
                    <div class="glass rounded-2xl p-6">
                        <label class="block text-sm font-medium mb-2">Descreva seu vídeo</label>
                        <textarea id="videoPrompt" class="w-full px-4 py-3 rounded-xl bg-dark-900 border border-gray-700 text-white h-32 resize-none focus:border-primary-500 focus:outline-none" placeholder="Ex: Mulher andando na praia com o por do sol, cinematic lighting, ultra detailed..."></textarea>
                        <div class="flex justify-between mt-2 text-sm text-gray-400">
                            <span id="charCount">0/500</span>
                        </div>
                    </div>

                    <!-- Qualidade -->
                    <div class="glass rounded-2xl p-6">
                        <h3 class="font-bold mb-4">Qualidade</h3>
                        <div class="space-y-3">
                            <label class="flex items-center justify-between p-4 rounded-xl bg-dark-900 border border-gray-700 cursor-pointer hover:border-primary-500 transition">
                                <div class="flex items-center space-x-3">
                                    <span class="text-2xl">📺</span>
                                    <div>
                                        <div class="font-semibold">4K Ultra HD</div>
                                        <div class="text-xs text-gray-400">3840 × 2160</div>
                                    </div>
                                </div>
                                <input type="radio" name="quality" value="4k" checked class="w-5 h-5 accent-primary-500">
                            </label>
                            <label class="flex items-center justify-between p-4 rounded-xl bg-dark-900 border border-gray-700 cursor-pointer hover:border-primary-500 transition">
                                <div class="flex items-center space-x-3">
                                    <span class="text-2xl">🖥️</span>
                                    <div>
                                        <div class="font-semibold">1080p Full HD</div>
                                        <div class="text-xs text-gray-400">1920 × 1080</div>
                                    </div>
                                </div>
                                <input type="radio" name="quality" value="1080p" class="w-5 h-5 accent-primary-500">
                            </label>
                            <label class="flex items-center justify-between p-4 rounded-xl bg-dark-900 border border-gray-700 cursor-pointer hover:border-primary-500 transition">
                                <div class="flex items-center space-x-3">
                                    <span class="text-2xl">💻</span>
                                    <div>
                                        <div class="font-semibold">720p HD</div>
                                        <div class="text-xs text-gray-400">1280 × 720</div>
                                    </div>
                                </div>
                                <input type="radio" name="quality" value="720p" class="w-5 h-5 accent-primary-500">
                            </label>
                        </div>
                    </div>

                    <!-- Botão Gerar -->
                    <button onclick="generateVideo()" class="w-full py-4 rounded-xl btn-primary text-lg font-bold flex items-center justify-center space-x-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                        <span>Gerar vídeo</span>
                    </button>
                </div>
            </div>

            <!-- ABA: MEUS VÍDEOS -->
            <div id="myvideosTab" class="tab-content p-6">
                <div class="max-w-6xl mx-auto">
                    <h2 class="text-2xl font-bold mb-6">Meus Vídeos</h2>
                    <div class="text-center text-gray-400 py-12">
                        <svg class="w-16 h-16 mx-auto mb-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                        </svg>
                        <p>Nenhum vídeo gerado ainda</p>
                        <button onclick="switchTab('create')" class="mt-4 text-primary-500 hover:underline">Criar seu primeiro vídeo</button>
                    </div>
                </div>
            </div>

            <!-- ABA: MODELOS -->
            <div id="templatesTab" class="tab-content p-6">
                <div class="max-w-6xl mx-auto">
                    <h2 class="text-2xl font-bold mb-6">Modelos Prontos</h2>
                    <p class="text-gray-400">Em breve: Modelos pré-configurados!</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Sidebar - Abrir/Fechar
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('active');
        }

        // Trocar Abas
        function switchTab(tabName) {
            // Esconde todas as abas
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            // Mostra a aba selecionada
            document.getElementById(tabName + 'Tab').classList.add('active');
            
            // Atualiza título
            const titles = {
                'create': 'Criar vídeo',
                'myvideos': 'Meus vídeos',
                'templates': 'Modelos'
            };
            document.getElementById('pageTitle').textContent = titles[tabName];
            
            // Atualiza menu ativo
            document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // Fecha sidebar no mobile
            if (window.innerWidth < 768) {
                closeSidebar();
            }
        }

        // Contador de caracteres
        document.getElementById('videoPrompt').addEventListener('input', function() {
            document.getElementById('charCount').textContent = this.value.length + '/500';
        });

        // Gerar Vídeo
        function generateVideo() {
            const prompt = document.getElementById('videoPrompt').value;
            if (!prompt) {
                alert('Por favor, descreva seu vídeo primeiro!');
                return;
            }
            alert('🎬 Em breve: Integração com IA generativa!\n\nSeu vídeo será gerado com:\n- Prompt: ' + prompt.substring(0, 50) + '...\n- Qualidade: ' + document.querySelector('input[name="quality"]:checked').value);
        }

        // Logout
        function logout() {
            if (confirm('Deseja sair?')) {
                alert('Logout realizado!');
            }
        }
    </script>
</body>
</html>
